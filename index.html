<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}
</style>

</head>

<body>

<video id="bg" muted playsinline loop autoplay preload="auto">
<source src="fondo.mp4" type="video/mp4">
</video>

<script>
const v=document.getElementById("bg");

v.play().catch(err=>{
    console.log(err);
});
</script>

</body>
</html>
